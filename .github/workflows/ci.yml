name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: python deps
        run: python -m pip install --upgrade pip && python -m pip install "numpy<2" h5py pandas pyarrow requests tqdm zstandard ruff mypy
      - name: ruff
        run: ruff check npc_labeler tests
      - name: mypy
        run: mypy
      - name: python compile
        run: python -m compileall npc_labeler tests
      - name: python tests
        run: python -m unittest discover -s tests
      - name: docker build
        run: docker build -t npc-labeler .
