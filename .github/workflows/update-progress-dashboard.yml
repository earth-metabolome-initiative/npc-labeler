name: Update Progress Dashboard

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NPC_LABELER_FONT_PATH: /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf
  PUBCHEM_TOTAL: "123541080"

permissions:
  contents: write

concurrency:
  group: update-progress-dashboard
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Regenerate dashboard
        run: |
          cargo run --bin npc-progress -- --pubchem-total "${PUBCHEM_TOTAL}" --output zenodo-progress.svg
          cargo run --bin npc-progress -- --pubchem-total "${PUBCHEM_TOTAL}" --output zenodo-progress.png

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add zenodo-progress.svg zenodo-progress.png
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update progress dashboard"
          git push
